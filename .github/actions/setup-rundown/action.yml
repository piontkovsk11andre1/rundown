name: Setup Rundown
description: Install dependencies and build rundown from source, making dist/cli.js available for the current job.

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Build rundown
      run: npm run build
      shell: bash
